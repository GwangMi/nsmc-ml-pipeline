name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install stage dependencies (if present)
        run: |
          for req in */requirements.txt; do
            [ -f "$req" ] && pip install -r "$req"
          done
          true

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
